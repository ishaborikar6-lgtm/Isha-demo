<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="javascript2.css">
<title>User Management</title>
</head>
<body>

<div class="container">
  <h1>User Management System</h1>
  <div class="topbar"></div>
  <button onclick="openAddModal()">+ Add User</button>
  <input  type="text" id="searchBox" onkeyup="searchUser()" placeholder="Search by name or email..">
  <table id="userTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- Add/Edit Modal -->
<div id="formModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('formModal')">&times;</span>
    <h2 id="formTitle">Add User</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">
    <textarea id="address" placeholder="Address"></textarea>
    <input type="text" id="hobby" placeholder="Hobby">

    <label>Gender:</label>
    <div class="gender">
      <label><input type="radio" name="gender" value="Male"> Male</label>
      <label><input type="radio" name="gender" value="Female"> Female</label>
    </div>

    <label>Known Languages:</label>
    <div class="languages">
      <label><input type="checkbox" value="English"> English</label>
      <label><input type="checkbox" value="Hindi"> Hindi</label>
      <label><input type="checkbox" value="Marathi"> Marathi</label>
    </div>
    <button onclick="saveUser()">Save</button>
  </div>
</div>

<!-- View Modal -->
<div id="viewModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('viewModal')">&times;</span>
    <h2>User Details</h2>
    <p id="viewDetails"></p>
  </div>
</div>

<script>
let users = [];
let editIndex = -1;

function openAddModal() {
  editIndex = -1;
  document.getElementById('formTitle').innerText = "Add User";
  clearForm();
  document.getElementById('formModal').style.display = 'block';
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

function clearForm() {
  document.getElementById('name').value = "";
  document.getElementById('email').value = "";
  document.getElementById('phone').value = "";
  document.getElementById('address').value = "";
  document.getElementById('hobby').value = "";
  document.querySelectorAll('input[name="gender"]').forEach(r => r.checked = false);
  document.querySelectorAll('.languages input').forEach(c => c.checked = false);
}

function saveUser() {
  let name = document.getElementById('name').value;
  let email = document.getElementById('email').value;
  let phone = document.getElementById('phone').value;
  let address = document.getElementById('address').value;
  let hobby = document.getElementById('hobby').value;
  let gender = document.querySelector('input[name="gender"]:checked')?.value || "";
  let languages = [...document.querySelectorAll('.languages input:checked')].map(c => c.value);

  let userData = { name, email, phone, address, hobby, gender, languages };

  if(editIndex === -1) {
    users.push(userData);
  } else 
  {
    users[editIndex] = userData;
  }
  closeModal('formModal');
  renderTable();
}

function renderTable() {
  let tbody = document.querySelector('#userTable tbody');
  tbody.innerHTML = "";
  users.forEach((user, index) => {
    let row = `<tr>
      <td>${user.name}</td>
      <td>${user.email}</td>
      <td>
        <button class="action-btn view" onclick="viewUser(${index})">View</button>
        <button class="action-btn edit" onclick="editUser(${index})">Edit</button>
        <button class="action-btn delete" onclick="deleteUser(${index})">Delete</button>
      </td>
    </tr>`;
    tbody.innerHTML += row;
  });
}

function viewUser(index) {
  let u = users[index];
  let details = `
    <b>Name:</b> ${u.name}<br>
    <b>Email:</b> ${u.email}<br>
    <b>Phone:</b> ${u.phone}<br>
    <b>Address:</b> ${u.address}<br>
    <b>Hobby:</b> ${u.hobby}<br>
    <b>Gender:</b> ${u.gender}<br>
    <b>Languages:</b> ${u.languages.join(", ")}
  `;
  document.getElementById('viewDetails').innerHTML = details;
  document.getElementById('viewModal').style.display = 'block';
}

function editUser(index) {
  editIndex = index;
  let u = users[index];
  document.getElementById('formTitle').innerText = "Edit User";
  document.getElementById('name').value = u.name;
  document.getElementById('email').value = u.email;
  document.getElementById('phone').value = u.phone;
  document.getElementById('address').value = u.address;
  document.getElementById('hobby').value = u.hobby;
  document.querySelector(input[name="gender"][value="${u.gender}"]).checked = true;
  document.querySelectorAll('.languages input').forEach(c => c.checked = u.languages.includes(c.value));
  document.getElementById('formModal').style.display = 'block';
}

function deleteUser(index) {
  if(confirm("Are you sure you want to delete this user?")) {
    users.splice(index, 1);
    renderTable();
  }
}

function searchUser(){
  let filter= document.getElementById("searchBox").value.toLowerCase();
  let rows= document.querySelectorAll("#userTable tbody tr");
  rows.forEach(row =>{
    let name = row.cells[0].textContent.toLowerCase();
    let email = row.cells[1].textContent.toLowerCase();
    if(name.includes(filter) ||
    email.includes(filter)){
      row.style.display ="";
    }
    else
    {
      row.style.display = "none";
    }
  });
}
</script>

</body>
</html>
